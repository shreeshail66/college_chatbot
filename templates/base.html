<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}College Chatbot{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% if session.get('roll_no') %}
<nav class="navbar">
    <div class="nav-brand">🎓 College Assistant</div>
    <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">Chat</a>
        <a href="{{ url_for('timetable') }}">Timetable</a>
        <a href="{{ url_for('faculty') }}">Faculty</a>
        <a href="{{ url_for('attendance') }}">Attendance</a>
        <a href="{{ url_for('faqs') }}">FAQs</a>
        <span class="nav-user">Hi, {{ session.get('name') }}</span>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>
</nav>
{% endif %}

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
