{% extends "base.html" %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>🎓 College Chatbot</h1>
    <p class="subtitle">Student Login</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Roll Number</label>
        <input type="text" name="roll_no" placeholder="e.g. 101" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p class="hint">Demo login: roll no <b>101</b>, password <b>1234</b></p>
    <p class="hint"><a href="{{ url_for('admin_login') }}">Admin Login →</a></p>
</div>
{% endblock %}
