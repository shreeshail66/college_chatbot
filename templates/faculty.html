{% extends "base.html" %}
{% block title %}Faculty{% endblock %}
{% block content %}
<h2>👩‍🏫 Faculty Information</h2>
<table class="data-table">
    <tr>
        <th>Name</th><th>Department</th><th>Subject</th><th>Email</th><th>Cabin</th>
    </tr>
    {% for row in rows %}
    <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.department }}</td>
        <td>{{ row.subject }}</td>
        <td>{{ row.email }}</td>
        <td>{{ row.cabin }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
